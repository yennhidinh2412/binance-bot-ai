services:
  - type: web
    name: binance-bot-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 web_dashboard:app
    plan: free
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_TESTNET
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
